<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Dashboard</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        #search {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        #products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 10px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px gray;
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: contain;
        }

        button {
            margin-top: 5px;
            padding: 5px;
            cursor: pointer;
        }

        #loader {
            color: blue;
        }

        #error {
            color: red;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
        }

        .modal-content {
            background: white;
            padding: 20px;
            margin: 10% auto;
            width: 300px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <!--<h1>Good morning</h1>
   <script src="./task1.js"></script> 
   <script src="./task2.js"></script>
   <script src="./task3.js"></script>
   <script src="./task4.js"></script>
   <script src="./task5.js"></script>
   <script src="./task6.js"></script>
   <script src="./task7.js"></script> -->

    
    <h1> Product Dashboard</h1>

    <input type="text" id="search" placeholder="Search products...">

    <div>
        <button onclick="sortLowHigh()">Low → High</button>
        <button onclick="sortHighLow()">High → Low</button>
    </div>

    <select id="category" onchange="filterCategory()">
        <option value="all">All</option>
        <option value="electronics">Electronics</option>
        <option value="jewelery">Jewelery</option>
        <option value="men's clothing">Men</option>
        <option value="women's clothing">Women</option>
    </select>

    <p id="loader">Loading...</p>
    <p id="error"></p>

    <div id="products"></div>

    
    <div id="modal" class="modal">
        <div class="modal-content">
            <span onclick="closeModal()"></span>
            <div id="modalData"></div>
        </div>
    </div>

    
    <script src="./task8.js"></script>

</body>
</html>
